name: Deploy Docs to Cloudflare Pages + GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml --no-transfer-progress

      - name: Verify docs output exists
        run: |
          cp _redirects target/site/_redirects   # Cloudflare Pages redirects (renamed-component 301s)
          cp d4678ef9e13144ea98140c24f5017559.txt target/site/   # IndexNow key file (Bing site verification)
          cp yandex_8291effdcecec4ba.html target/site/            # Yandex Webmaster site verification

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy target/site --project-name=alexmond-org --branch=main

      - name: Notify IndexNow (Bing / Yandex / DuckDuckGo)
        env:
          INDEXNOW_KEY: d4678ef9e13144ea98140c24f5017559   # public key (also served at /<key>.txt)
          SITE_HOST: www.alexmond.org
        run: python3 bin/indexnow-ping.py

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
